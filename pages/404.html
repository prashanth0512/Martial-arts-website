<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Shield & Strike</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/404.css">
    <link rel="icon" type="image/svg+xml" href="../images/logo.svg">
</head>
<body class="error-page">

    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <div class="error-visual">
                <div class="fighter-glow"></div>
                <img src="../images/logo.svg" alt="Error Visual" class="floating-logo">
            </div>
            <h2 class="error-title">LOST IN TRAINING?</h2>
            <p class="error-message">The page you're looking for was knocked out or doesn't exist. Let's get you back to the dojo.</p>
            <div class="error-actions">
                <a href="../index.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> BACK TO HOME</a>
                <a href="contact.html" class="btn btn-outline">CONTACT US</a>
            </div>
        </div>
    </div>

</body>
</html>
