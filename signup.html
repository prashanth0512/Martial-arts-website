<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Shield &amp; Strike</title>
  <meta name="description" content="Create your Shield & Strike martial arts account. Start your journey today and unlock world-class training programs." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="../css/signup.css" />

  <link rel="icon" type="image/svg+xml" href="../images/logo.svg" />
  <link rel="alternate icon" type="image/x-icon" href="../favicon.ico" />
</head>
<body>

  <div class="auth-bg" id="auth-bg"></div>
  <div class="auth-bg-overlay"></div>

  <button class="rtl-toggle" id="rtl-toggle" aria-label="Toggle LTR/RTL">
    LTR
  </button>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <i class="fa-solid fa-sun" id="theme-icon"></i>
  </button>

  <div class="auth-screen">
    <div class="auth-card" role="main">

      <div class="auth-brand">
        <a href="../index.html" class="brand-link">
          <img src="../images/logo.svg" alt="Shield &amp; Strike Logo" class="brand-logo" />
          <span class="brand-name">Shield &amp; Strike</span>
        </a>
      </div>

      <div class="auth-heading">
        <h1>Create Account</h1>
        <p>Join thousands of martial artists training with us</p>
      </div>

      <div class="social-login">
        <button class="social-btn google-btn" id="google-signup" type="button" aria-label="Sign up with Google">
          <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Sign up with Google</span>
        </button>

        <button class="social-btn apple-btn" id="apple-signup" type="button" aria-label="Sign up with Apple">
          <i class="fa-brands fa-apple social-icon-fa"></i>
          <span>Sign up with Apple</span>
        </button>
      </div>

      <div class="auth-divider">
        <span>or signup with email</span>
      </div>

      <form class="auth-form" id="signup-form" novalidate>

        <div class="input-group">
          <label for="signup-name">Full Name</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-user input-icon"></i>
            <input
              type="text"
              id="signup-name"
              name="name"
              placeholder="Your full name"
              autocomplete="name"
              required
            />
          </div>
          <span class="field-error" id="name-error"></span>
        </div>

        <div class="input-group">
          <label for="signup-email">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input
              type="email"
              id="signup-email"
              name="email"
              placeholder="your@email.com"
              autocomplete="email"
              required
            />
          </div>
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="input-group">
          <label for="signup-password">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="Create a strong password"
              autocomplete="new-password"
              required
            />
            <button type="button" class="eye-toggle" id="pw-eye" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye" id="pw-eye-icon"></i>
            </button>
          </div>
          <span class="field-error" id="pw-error"></span>
          <div class="strength-meter" id="strength-meter">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>

        <button type="submit" class="cta-btn" id="signup-submit">
          <span class="btn-text">Sign Up</span>
          <i class="fa-solid fa-arrow-right btn-arrow"></i>
        </button>

      </form>

      <p class="auth-footer-text">
        Already have an account?
        <a href="login.html" class="auth-switch-link">Login</a>
      </p>

    </div>
  </div>

  <script src="../js/signup.js"></script>
</body>
</html>
